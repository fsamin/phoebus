site_name: Phœbus — Specifications
site_description: Product specification, technical architecture, and detailed specifications for Phœbus
theme:
  name: material
  palette:
    scheme: default
    primary: deep orange
    accent: orange
  icon:
    logo: material/fire
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy

docs_dir: docs

nav:
  - Home: index.md
  - Product Specification: product-specification.md
  - Technical Architecture: technical-architecture.md
  - Detailed Specifications: detailed-specifications.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - toc:
      permalink: true
