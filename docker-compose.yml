services:
  phoebus:
    build: .
    ports:
      - "8080:8080"
    environment:
      CONFIGURATION_FROM: "filetree:/etc/phoebus/conf.d"
    volumes:
      - ./config:/etc/phoebus/conf.d:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: phoebus
      POSTGRES_PASSWORD: phoebus
      POSTGRES_DB: phoebus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoebus"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
