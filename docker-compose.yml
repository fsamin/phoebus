services:
  phoebus:
    build: .
    ports:
      - "21818:8080"
    environment:
      CONFIGURATION_FROM: "filetree:/etc/phoebus/conf.d"
    volumes:
      - ./config.example:/etc/phoebus/conf.d:ro
      - ~/phoebus-content:/data/phoebus-content:ro
      - assets_data:/data/assets
      - ~/src/stash.ovh.net/francois.samin/engineering-101:/data/engineering:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: phoebus
      POSTGRES_PASSWORD: phoebus
      POSTGRES_DB: phoebus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c log_min_messages=warning
      -c log_min_error_statement=error
      -c log_statement=none
      -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoebus"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  assets_data:
