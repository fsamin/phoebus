services:
  db-e2e:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: phoebus
      POSTGRES_PASSWORD: phoebus
      POSTGRES_DB: phoebus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoebus"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-e2e:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio-e2e:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-e2e:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/phoebus-assets &&
      exit 0
      "

  phoebus-e2e:
    build: .
    ports:
      - "9080:8080"
    environment:
      CONFIGURATION_FROM: "filetree:/etc/phoebus/conf.d"
    volumes:
      - ./e2e/config:/etc/phoebus/conf.d:ro
    depends_on:
      db-e2e:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-noble
    working_dir: /app
    volumes:
      - ./e2e:/app
    environment:
      BASE_URL: http://phoebus-e2e:8080
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      - phoebus-e2e
    command: >
      bash -c "
        npm ci --silent &&
        npx playwright install --with-deps chromium &&
        npx playwright test ${PLAYWRIGHT_ARGS:-}
      "
